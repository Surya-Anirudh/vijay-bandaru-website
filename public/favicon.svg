<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon outline -->
  <polygon points="60,8 101,31 101,77 60,100 19,77 19,31"
           fill="none" stroke="#1a2d6d" stroke-width="5" stroke-linejoin="round"/>

  <!-- V chevron left half -->
  <polyline points="19,31 52,54 19,77"
            fill="none" stroke="#1a2d6d" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- B right half -->
  <line x1="60" y1="26" x2="60" y2="86" stroke="#2563eb" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M60,26 C78,26 83,35 83,43 C83,51 78,56 60,56"
        fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <path d="M60,56 C81,56 87,65 87,73 C87,81 81,86 60,86"
        fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

  <!-- Lightning bolt glow layer -->
  <polyline points="14,46 62,68 108,46"
            fill="none" stroke="#f59e0b" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#glow)"/>

  <!-- Lightning bolt main (gold) -->
  <polyline points="14,46 62,68 108,46"
            fill="none" stroke="#d97706" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small dots at bolt tips -->
  <circle cx="14" cy="46" r="2.5" fill="#f59e0b"/>
  <circle cx="108" cy="46" r="2.5" fill="#f59e0b"/>
</svg>
