<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Outer diamond frame -->
  <polygon points="60,5 115,60 60,115 5,60" fill="none" stroke="#1e3a8a" stroke-width="6" stroke-linejoin="round"/>

  <!-- V — chevron on left half, two bold strokes meeting at center-left -->
  <polyline points="28,22 56,60 28,98" fill="none" stroke="#1e3a8a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- B — spine + two bumps on right half -->
  <line x1="64" y1="28" x2="64" y2="92" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M64,28 Q88,28 88,44 Q88,60 64,60" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <path d="M64,60 Q92,60 92,76 Q92,92 64,92" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

  <!-- Gold arrow through center -->
  <line x1="3" y1="60" x2="103" y2="60" stroke="#c49a1a" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="115,60 100,53 100,67" fill="#c49a1a"/>
  <line x1="3" y1="60" x2="16" y2="51" stroke="#c49a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="3" y1="60" x2="16" y2="69" stroke="#c49a1a" stroke-width="3" stroke-linecap="round"/>
</svg>
