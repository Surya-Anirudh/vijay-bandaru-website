<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Radiating gold rays (excellence / energy) -->
  <g stroke="#c49a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="60" y1="60" x2="60" y2="2"/>
    <line x1="60" y1="60" x2="118" y2="60"/>
    <line x1="60" y1="60" x2="60" y2="118"/>
    <line x1="60" y1="60" x2="2" y2="60"/>
    <line x1="60" y1="60" x2="103" y2="17"/>
    <line x1="60" y1="60" x2="103" y2="103"/>
    <line x1="60" y1="60" x2="17" y2="103"/>
    <line x1="60" y1="60" x2="17" y2="17"/>
  </g>

  <!-- Navy circle -->
  <circle cx="60" cy="60" r="48" fill="#0c1a4a"/>
  <!-- Gold outer ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#c49a1a" stroke-width="3"/>
  <!-- Gold inner ring accent -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#c49a1a" stroke-width="0.8" opacity="0.5"/>

  <!-- Gold star at top -->
  <polygon points="60,15 62.5,22 70,22 64,27 66.5,34 60,29.5 53.5,34 56,27 50,22 57.5,22" fill="#c49a1a"/>

  <!-- V — white, bold -->
  <polyline points="18,38 42,84 66,38" fill="none" stroke="white" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- B — sky blue -->
  <line x1="72" y1="38" x2="72" y2="84" stroke="#7dd3fc" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M72,38 C88,38 90,46 90,51 C90,56 88,61 72,61" fill="none" stroke="#7dd3fc" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M72,61 C90,61 93,69 93,72.5 C93,76 90,84 72,84" fill="none" stroke="#7dd3fc" stroke-width="5.5" stroke-linecap="round"/>
</svg>
