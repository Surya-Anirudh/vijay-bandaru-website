<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2460"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Gold top accent stripe -->
  <rect x="0" y="0" width="100" height="6" rx="3" fill="#f59e0b"/>

  <!-- V — white, bold -->
  <polyline points="8,22 32,76 56,22" fill="none" stroke="white" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- B — gold/amber, right side -->
  <line x1="62" y1="22" x2="62" y2="78" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <path d="M62,22 C78,22 82,31 82,38 C82,46 78,50 62,50" fill="none" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <path d="M62,50 C80,50 85,59 85,66 C85,73 80,78 62,78" fill="none" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
</svg>
